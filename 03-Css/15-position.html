<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15-positions</title>

    <!-- MISMA RUTA -->
    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

        section.positions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
            margin-top: 3rem;
        }

        /* CONTENEDOR GENERAL */
        div.container {
            position: relative;

            width: 350px;
            height: 180px;

            border: 4px solid white;
            background-color: rgba(255,255,255,0.1);

            padding: 1rem;
        }

        /* CAJAS */
        div.box {
            width: 100px;
            height: 100px;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            font-weight: bold;
        }

        /* STATIC */
        div.static {
            background-color: crimson;
            position: static;
        }

        /* RELATIVE */
        div.relative {
            background-color: royalblue;

            position: relative;

            top: 20px;
            left: 30px;
        }

        /* ABSOLUTE */
        div.absolute {
            background-color: darkorange;

            position: absolute;

            top: 20px;
            right: 20px;
        }

        /* FIXED */
        div.fixed {
            background-color: green;

            position: fixed;

            bottom: 20px;
            right: 20px;

            width: 90px;
            height: 90px;

            border-radius: 50%;
        }

        /* STICKY */
        div.sticky {
            background-color: purple;

            position: sticky;

            top: 10px;
        }

        /* ESPACIO PARA SCROLL */
        div.space {
            height: 600px;
        }

    </style>
</head>

<body>

    <!-- MISMO BOTON -->
    <a href="../03-css/index.html" class="btn-home">

        <svg xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            fill="white"
            viewBox="0 0 256 256">

            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,
                58.34a8,8,0,0,1-11.32,11.32l-72-72a8,
                8,0,0,1,0-11.32l72-72a8,8,0,0,1,
                11.32,11.32L59.31,120H216A8,8,0,0,1,
                224,128Z">
            </path>

        </svg>

    </a>

    <main>

        <header>
            <h1>15-positions</h1>

            <h2>
                CSS position property specifies how an element is positioned.
            </h2>
        </header>

        <section>

            <h3>Normal / Static:</h3>

            <section class="positions">

                <div class="container">
                    <div class="box static">
                        STATIC
                    </div>
                </div>

            </section>

            <h3>Relative:</h3>

            <section class="positions">

                <div class="container">
                    <div class="box relative">
                        RELATIVE
                    </div>
                </div>

            </section>

            <h3>Absolute:</h3>

            <section class="positions">

                <div class="container">

                    <div class="box static">
                        STATIC
                    </div>

                    <div class="box absolute">
                        ABSOLUTE
                    </div>

                </div>

            </section>

            <h3>Sticky:</h3>

            <section class="positions">

                <div class="container">

                    <div class="box sticky">
                        STICKY
                    </div>

                </div>

            </section>

            <h3>Fixed:</h3>

            <section class="positions">

                <div class="container">

                    <div class="box fixed">
                        FIXED
                    </div>

                </div>

            </section>

    </main>

</body>
</html>
