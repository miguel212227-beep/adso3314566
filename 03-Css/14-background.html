<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>14-backgrounds</title>
    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

        section.backgrounds {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            margin-top: 3rem;
        }

        /* BACKGROUND COLOR */
        div.bg-color {
            background-color: rgb(207, 198, 200);

            width: 320px;
            height: 120px;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            border-radius: 10px;
        }

        /* BACKGROUND IMAGE */
        div.bg-image {

            background-image: url(img/BARCELONA_CAMPEON.png);

            width: 1000px;
            height: 700px;

            border: 4px solid white;
        }

        /* BACKGROUND REPEAT */
        div.bg-repeat {

            background-color: white;

            background-image: url(img/BARCELONA_CAMPEON.png);
            background-repeat: repeat;

            background-size: 60px;

            width: 320px;
            height: 180px;

            border: 4px solid white;
        }

        /* BACKGROUND POSITION */
        div.bg-position {

            background-image: url(img/BARCELONA_CAMPEON.png);
            background-repeat: no-repeat;

            background-position: center;

            background-size: 120px;

            width: 320px;
            height: 200px;

            background-color: rgb(179, 167, 169);

            border: 4px solid white;
        }

        /* BACKGROUND SIZE */
        div.bg-size {

            background-image: url(img/BARCELONA_CAMPEON.png);
            background-repeat: no-repeat;

            background-size: cover;

            background-position: center;

            width: 320px;
            height: 220px;

            border: 4px solid white;
        }

    </style>

</head>

<body>

    <!-- MISMO BOTON -->
    <a href="../03-css/index.html" class="btn-home">

        <svg xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            fill="white"
            viewBox="0 0 256 256">

            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,
                58.34a8,8,0,0,1-11.32,11.32l-72-72a8,
                8,0,0,1,0-11.32l72-72a8,8,0,0,1,
                11.32,11.32L59.31,120H216A8,8,0,0,1,
                224,128Z">
            </path>

        </svg>

    </a>

    <main>

        <header>
            <h1>14-backgrounds</h1>

            <h2>
                CSS backgrounds allow you to add colors and images to elements.
            </h2>
        </header>

            <h3>Background Examples:</h3>

            <section class="backgrounds">

                <!-- BACKGROUND COLOR -->
                <div class="bg-color">
                    <p>Background-color</p>
                </div>
                </section>

                <section class="backgrounds">
                <!-- BACKGROUND IMAGE -->
                <h3>Background-image</h3>
                <div class="bg-image">
                </div>
                </section>

                <section class="backgrounds">
                <!-- BACKGROUND REPEAT -->
                <h3>Background-repeat</h3>
                <div class="bg-repeat"></div>
                </section>

                <section class="backgrounds">
                <!-- BACKGROUND POSITION -->
                <h3>Background-position</h3>
                <div class="bg-position"></div>
                </section>

                <section class="backgrounds">
                <!-- BACKGROUND SIZE -->
                <h3>Background-size</h3>
                <div class="bg-size"></div>
            </section>

        </section>

    </main>

</body>
</html>
