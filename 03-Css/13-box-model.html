<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13-Box-Model</title>

    <!-- MISMA RUTA DE TUS EJERCICIOS -->
    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

        /* CONTENEDOR PRINCIPAL */
        section.box-model {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 4rem;
        }

        /* MARGIN */
        div.margin {
            background-color: rgba(173, 216, 230, 0.4);
            padding: 40px;
        }

        /* BORDER */
        div.border {
            border: 6px solid #1b4cff;
            padding: 30px;
        }

        /* PADDING */
        div.padding {
            background-color: rgba(0, 0, 255, 0.2);
            padding: 25px;
        }

        /* CONTENT */
        div.content {
            background-color: white;
            width: 220px;
            height: 120px;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            text-align: center;
        }

        div.content h4 {
            margin: 0;
        }

        div.content p {
            font-size: 0.8rem;
        }

    </style>
</head>

<body>

    <!-- MISMO BOTON HOME -->
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            fill="white"
            viewBox="0 0 256 256">

            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,
                58.34a8,8,0,0,1-11.32,11.32l-72-72a8,
                8,0,0,1,0-11.32l72-72a8,8,0,0,1,
                11.32,11.32L59.31,120H216A8,8,0,0,1,
                224,128Z">
            </path>

        </svg>
    </a>

    <main>

        <header>
            <h1>13 Box Model</h1>
            <h2>
                Is essentially a box that wraps around every html element.
            </h2>
        </header>

        <section>

            <h3>Example Box Model:</h3>

            <section class="box-model">

                <!-- MARGIN -->
                <div class="margin">
                    <p>Margin</p>

                    <!-- BORDER -->
                    <div class="border">
                        <p>Border</p>

                        <!-- PADDING -->
                        <div class="padding">
                            <p>Padding</p>

                            <!-- CONTENT -->
                            <div class="content">
                                <h4>CONTENT</h4>
                                <p>Box Model Example</p>
                            </div>

                        </div>

                    </div>

                </div>

            </section>

        </section>

    </main>

</body>
</html>
