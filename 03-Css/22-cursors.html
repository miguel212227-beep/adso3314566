<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>22-cursors</title>

    <!-- MISMA RUTA -->
    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>
        section.cursor-examples {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;

            margin-top: 3rem;
        }

        /* CONTENEDOR */
        div.cursor-box {
            width: 700px;

            border: 4px solid white;
            padding: 2rem;

            background-color: rgba(255, 255, 255, 0.1);

            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        /* BOTONES */
        div.cursor-item {
            height: 90px;

            display: flex;
            justify-content: center;
            align-items: center;

            background-color: royalblue;

            color: white;
            font-weight: bold;

            border-radius: 10px;

            transition: all 0.3s ease;
        }

        div.cursor-item:hover {
            transform: scale(1.03);
            background-color: crimson;
        }

        /* ===================== */
        /* CURSORS */
        /* ===================== */

        .pointer {
            cursor: pointer;
        }

        .wait {
            cursor: wait;
        }

        .crosshair {
            cursor: crosshair;
        }

        .move {
            cursor: move;
        }

        .text {
            cursor: text;
        }

        .help {
            cursor: help;
        }

        .not-allowed {
            cursor: not-allowed;
        }

        .grab {
            cursor: grab;
        }
    </style>
</head>

<body>

    <!-- MISMO BOTON -->
    <a href="../03-css/index.html" class="btn-home">

        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">

            <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,
                58.34a8,8,0,0,1-11.32,11.32l-72-72a8,
                8,0,0,1,0-11.32l72-72a8,8,0,0,1,
                11.32,11.32L59.31,120H216A8,8,0,0,1,
                224,128Z">
            </path>

        </svg>

    </a>

    <main>

        <header>

            <h1>22-cursors</h1>

            <h2>
                The cursor property specifies the mouse cursor displayed over an element.
            </h2>

        </header>

        <section>

            <section class="cursor-examples">

                <div class="cursor-box">

                    <div class="cursor-item pointer">
                        cursor: pointer
                    </div>

                    <div class="cursor-item wait">
                        cursor: wait
                    </div>

                    <div class="cursor-item crosshair">
                        cursor: crosshair
                    </div>

                    <div class="cursor-item move">
                        cursor: move
                    </div>

                    <div class="cursor-item text">
                        cursor: text
                    </div>

                    <div class="cursor-item help">
                        cursor: help
                    </div>

                    <div class="cursor-item not-allowed">
                        cursor: not-allowed
                    </div>

                    <div class="cursor-item grab">
                        cursor: grab
                    </div>

                </div>

            </section>

        </section>

    </main>

</body>

</html>
