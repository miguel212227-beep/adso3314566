<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12-Colors-Alpha</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        figure.Barcelona{
            background:url(img/BARCELONA_CAMPEON.png)
                        no-repeat center /cover;
            border: 4px solid #fff;
            margin-block: 4rem;
            height:380px;
            width:380px;
        }
        div{
            height: calc(380px/3);
            &.box1 {
                background-color:rgba(255, 255, 255, 0.8);
            }
            &.box2{
                background-color:#ffffff73;
            }
            &.box3{
                background-color:rgba(hsla(0, 0%, 45%, 0.267));
            }
        }
        
    </style>
</head>
<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>
    <main>
        <header>
            <h1>12 Colors Alpha</h1>
            <h2>The fourth alpha channel allows you to apply opacity or transparency to the color.</h2>
        </header>
        <section>
            <h3>Example transparent Colors:</h3>
            <figure class="Barcelona">
                <div class="box1"></div>
                <div class="box2"></div>
                <div class="box3"></div>
            </figure>
            </section>
            
    </main>
</body>

</html>
