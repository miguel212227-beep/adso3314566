<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>18-Typography</title>

    <!-- MISMA RUTA -->
    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>
        section.typography {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;

            margin-top: 3rem;
        }

        /* CONTENEDORES */
        div.text-box {
            width: 700px;

            border: 4px solid white;
            padding: 2rem;

            background-color: rgba(255, 255, 255, 0.1);
        }

        /* ===================== */
        /* COLOR */
        /* ===================== */

        p.color-text {
            color: crimson;
        }

        /* ===================== */
        /* FONT FAMILY */
        /* ===================== */

        p.family-arial {
            font-family: Arial, sans-serif;
        }

        p.family-courier {
            font-family: "Courier New", monospace;
        }

        p.family-georgia {
            font-family: Georgia, serif;
        }

        /* ===================== */
        /* FONT SIZE */
        /* ===================== */

        p.size-small {
            font-size: 0.8rem;
        }

        p.size-medium {
            font-size: 1.2rem;
        }

        p.size-large {
            font-size: 2rem;
        }

        /* ===================== */
        /* FONT WEIGHT */
        /* ===================== */

        p.weight-light {
            font-weight: 300;
        }

        p.weight-normal {
            font-weight: 500;
        }

        p.weight-bold {
            font-weight: 900;
        }
    </style>
</head>

<body>

    <!-- MISMO BOTON -->
    <a href="../03-css/index.html" class="btn-home">

        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">

            <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,
                58.34a8,8,0,0,1-11.32,11.32l-72-72a8,
                8,0,0,1,0-11.32l72-72a8,8,0,0,1,
                11.32,11.32L59.31,120H216A8,8,0,0,1,
                224,128Z">
            </path>

        </svg>

    </a>

    <main>

        <header>

            <h1>18 Typography</h1>

            <h2>
                CSS typography controls the appearance of text.
            </h2>

        </header>

        <section>

            <!-- COLOR -->
            <h3>Color:</h3>

            <section class="typography">

                <div class="text-box">

                    <p class="color-text">
                        This text uses the color property.
                    </p>

                </div>

            </section>

            <!-- FONT FAMILY -->
            <h3>Font Family:</h3>

            <section class="typography">

                <div class="text-box">

                    <p class="family-arial">
                        Arial Font Family
                    </p>

                    <p class="family-courier">
                        Courier New Font Family
                    </p>

                    <p class="family-georgia">
                        Georgia Font Family
                    </p>

                </div>

            </section>

            <!-- FONT SIZE -->
            <h3>Font Size:</h3>

            <section class="typography">

                <div class="text-box">

                    <p class="size-small">
                        Small Text
                    </p>

                    <p class="size-medium">
                        Medium Text
                    </p>

                    <p class="size-large">
                        Large Text
                    </p>

                </div>

            </section>

            <!-- FONT WEIGHT -->
            <h3>Font Weight:</h3>

            <section class="typography">

                <div class="text-box">

                    <p class="weight-light">
                        Light Weight
                    </p>

                    <p class="weight-normal">
                        Normal Weight
                    </p>

                    <p class="weight-bold">
                        Bold Weight
                    </p>

                </div>

            </section>

        </section>

    </main>

</body>

</html>
