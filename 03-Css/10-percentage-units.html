<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Percentage Units</title>
    <link rel="stylesheet" href="../src/css/03-CSS.css">
    <style>
        main {
            width: 100%;
            section.percentage {
                margin: 0 auto;
                width: 80%;
                div.parent {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    div {
                        display: flex;
                        justify-content: center;
                        font-size: 2.4rem;
                        align-items: center;
                        height: 50dvh;
                        &.child1 {
                            background-color: red;
                            width: 70%;
                        }
                        &.child2 {
                            background-color: rgb(0, 38, 255);
                            width: 30%;
                        }
                    }
                }
            }
        }
    </style>
</head>
<body>
    <a class="btn-home" href="../03-Css/index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M240,208H224V136l2.34,2.34A8,8,0,0,0,237.66,127L139.31,28.68a16,16,0,0,0-22.62,0L18.34,127a8,8,0,0,0,11.32,11.31L32,136v72H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM48,120l80-80,80,80v88H160V152a8,8,0,0,0-8-8H104a8,8,0,0,0-8,8v56H48Zm96,88H112V160h32Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>10 Percentage Units</h1>
            <h2>Are relative to the size of the parent element.</h2>
        </header>
        <section class="percentage">
            <div class="parent">
                <div class="child1">70%</div>
                <div class="child2">30%</div>
            </div>
        </section>
    </main>
</body>
</html>
