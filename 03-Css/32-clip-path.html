<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>32-Clip-Path</title>
    <link rel="stylesheet" href="../src/css/03-CSS.css">
    <style>
        .clip-path-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .clip-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            color: #fff;
            transition: transform 0.3s ease;
        }

        .clip-card:hover {
            transform: translateY(-5px);
        }

        .clip-card h3 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            color: #e94560;
        }

        .clip-card p {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 1rem;
            font-family: monospace;
            background: #2a2a4e;
            padding: 0.5rem;
            border-radius: 4px;
        }

        .clip-demo {
            width: 100%;
            height: 250px;
            background: url(img/spiderman.jpg) center/cover no-repeat;
            margin: 0 auto;
            border-radius: 8px;
            transition: clip-path 0.8s ease-in-out;
        }
        
        .clip-circulo {
            clip-path: circle(40% at center);
        }
        .clip-circulo:hover {
            clip-path: circle(70% at center);
        }
        .clip-telarana {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
        .clip-telarana:hover {
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
        }
        .clip-diamante {
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }
        .clip-diamante:hover {
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            transform: rotate(45deg);
        }
        .clip-inset {
            clip-path: inset(10% 20% 10% 20% round 20px);
        }
        .clip-inset:hover {
            clip-path: inset(0% 0% 0% 0% round 50px);
        }
        .clip-elipse {
            clip-path: ellipse(60% 40% at center);
        }
        .clip-elipse:hover {
            clip-path: ellipse(80% 60% at center);
        }
        .clip-hexagono {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }
        .clip-hexagono:hover {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
    </style>
</head>
<body>
    <a class="btn-home" href="../03-Css/index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M240,208H224V136l2.34,2.34A8,8,0,0,0,237.66,127L139.31,28.68a16,16,0,0,0-22.62,0L18.34,127a8,8,0,0,0,11.32,11.31L32,136v72H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM48,120l80-80,80,80v88H160V152a8,8,0,0,0-8-8H104a8,8,0,0,0-8,8v56H48Zm96,88H112V160h32Z">
            </path>
        </svg>
    </a>
    <main>
        <header>
            <h1>32 Clip Path</h1>
            <h2>Property lets you clip an element to a basic shape.</h2>
        </header>

        <section class="clip-path-section">
            <div class="clip-card">
                <h3>⭕ Círculo</h3>
                <div class="clip-demo clip-circulo"></div>
            </div>
            <div class="clip-card">
                <h3>🕸️ Telaraña</h3>
                <div class="clip-demo clip-telarana"></div>
            </div>
            <div class="clip-card">
                <h3>💎 Diamante</h3>
                <div class="clip-demo clip-diamante"></div>
            </div>
            <div class="clip-card">
                <h3>📦 Inset</h3>
                <div class="clip-demo clip-inset"></div>
            </div>
            <div class="clip-card">
                <h3>⭕ Elipse</h3>
                <div class="clip-demo clip-elipse"></div>
            </div>
            <div class="clip-card">
                <h3>⬡ Hexágono</h3>
                <div class="clip-demo clip-hexagono"></div>
            </div>
        </section>
    </main>
</body>
</html>
