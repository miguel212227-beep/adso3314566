    <title>25-New-Selectors</title>
    <link rel="stylesheet" href="../src/css/03-CSS.css">
<style>
        figure.frame {
        background: #fff;
        width: calc(50 * 20px);
        height: calc(50 * 50px);
        margin: 2rem auto;
        position: relative;
        overflow: hidden;
        transform: scale(0.60);
        transform-origin: top center;
    }
    div.squares {
        background: url(img/square.png.jpeg) repeat;
        opacity: 0.4;
        position: absolute;
        inset: 0;
        z-index: 2;
    }

div.escultura {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: rgb(14, 21, 78);
    box-shadow:

    0px 0px 0 rgb(14, 21, 78),
    20px 0px 0 rgb(14, 21, 78),
    40px 0px 0 rgb(14, 21, 78),
    60px 0px 0 rgb(14, 21, 78);



    z-index: 1;
}

</style>
</head>
