<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-challenge-tables</title>
    <link rel="stylesheet" href="../src/css/02-Html.css">
</head>
<body>
    <a class="btn-home" href="../02-Html/index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M240,208H224V136l2.34,2.34A8,8,0,0,0,237.66,127L139.31,28.68a16,16,0,0,0-22.62,0L18.34,127a8,8,0,0,0,11.32,11.31L32,136v72H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM48,120l80-80,80,80v88H160V152a8,8,0,0,0-8-8H104a8,8,0,0,0-8,8v56H48Zm96,88H112V160h32Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>10 Challenge Tables</h1>
            <h2>Practices table creation and structure.</h2>
        </header>
        <style>
  table {
    width: 100%;
    border-collapse: collapse;
  }
  td {
    border: 3px solid #ccc;
    height: 40px;
    text-align: center;
    vertical-align: middle;
    font-size: 24px;
    width: 20PX;
  }
  .dark {
    background: #000;
    color: #fff;
  }
  .light {
    background: #444;
  }
</style>
        <section>
            <table>

<!-- FILA 1 -->
<tr>
  <td class="light" colspan="4"></td>
  <td class="dark">😎</td>
  <td class="light" colspan="3"></td>
</tr>

<!-- FILA 2 -->
<tr>
  <td class="light" colspan="3"></td>
  <td class="dark">😎</td>
  <td class="dark" rowspan="2">😎</td>
  <td class="dark">😎</td>
  <td class="light" colspan="2"></td>
</tr>

<!-- FILA 3 -->
<tr>
  <td class="light" colspan="2"></td>
  <td class="dark">😎</td>
  <td class="light"></td>
  <td class="dark">😎</td>
  <td class="light" colspan="2"></td>
</tr>

<!-- FILA 4 -->
<tr>
  <td class="light" colspan="2"></td>
  <td class="dark">😎</td>
  <td class="dark" colspan="3">😎</td>
  <td class="light"></td>
  <td class="light"></td>
</tr>

<!-- FILA 5 -->
<tr>
  <td class="light"></td>
  <td class="dark">😎</td>
  <td class="dark" colspan="4">😎</td>
  <td class="dark">😎</td>
  <td class="light"></td>
</tr>

<!-- FILA 6 -->
<tr>
  <td class="light" colspan="2"></td>
  <td class="light"></td>
  <td class="dark">😎</td>
  <td class="dark">😎</td>
  <td class="dark">😎</td>
  <td class="light" colspan="2"></td>
</tr>

<!-- FILA 7 -->
<tr>
  <td class="light" colspan="3"></td>
  <td class="dark">😎</td>
  <td class="light"></td>
  <td class="dark">😎</td>
  <td class="light" colspan="2"></td>
</tr>

<!-- FILA 8 -->
<tr>
  <td class="light" colspan="4"></td>
  <td class="dark">😎</td>
  <td class="dark">😎</td>
  <td class="dark">😎</td>
  <td class="light"></td>
</tr>

<!-- FILA 9 -->
<tr>
  <td class="light" colspan="4"></td>
  <td class="light"></td>
  <td class="dark">😎</td>
  <td class="light"></td>
  <td class="light"></td>
</tr>

</table>
            </section>
    </main>
</body>
</html>
